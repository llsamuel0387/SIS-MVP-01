name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres?schema=public
  SIS_TEST_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/sis_mvp_integration?schema=public
  PERSON_DATA_KEY_BASE64: BwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
  PII_INDEX_KEY_BASE64: BwAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
  JWT_ACCESS_SECRET: ci-placeholder-jwt-access-secret-min-32-chars
  JWT_REFRESH_SECRET: ci-placeholder-jwt-refresh-secret-min-32-chars

jobs:
  verify:
    name: Lint, types, tests, build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Required repo files (eslint.config, AGENTS)
        run: npm run check:repo-files

      - name: Prisma generate
        run: npx prisma generate

      - name: Prisma schema (build-time DB)
        run: npx prisma db push --accept-data-loss

      - name: ESLint
        run: npm run lint

      - name: Mutation API audit logging
        run: npm run check:mutation-audit

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm run test

      - name: API integration tests
        run: npm run test:integration

      - name: Next.js build
        run: npm run build

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Prisma generate
        run: npx prisma generate

      - name: Prisma schema (optional for dev server)
        run: npx prisma db push --accept-data-loss

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run E2E
        run: npm run test:e2e
